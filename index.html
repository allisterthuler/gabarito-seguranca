<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito de Segurança</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>AMBEV - GABARITO DE SEGURANÇA</h1>

        <form id="avaliacaoForm">

            <div class="campo">
                <label>ID Avaliador *</label>
                <input
                    type="text"
                    id="idAvaliador"
                    required
                >
            </div>

            <div class="campo">
                <label>ID Funcionário Avaliado *</label>
                <input
                    type="text"
                    id="idFuncionario"
                    required
                >
            </div>

            <div class="campo">
                <label>Selecione o Questionário *</label>

                <select id="questionario" required>
                    <option value="">Selecione...</option>
                    <option value="GSL">GSL</option>
                    <option value="GSR_CARRO">GSR CARRO</option>
                    <option value="GSR_MOTO">GSR MOTO</option>
                    <option value="GSR_APE">GSR A PÉ</option>
                </select>
            </div>

            <div id="perguntasContainer"></div>

            <div
                id="placaContainer"
                class="campo oculto"
            >
                <label>Informe a Placa *</label>
                <input
                    type="text"
                    id="placa"
                >
            </div>

            <div class="campo">
                <label>Comentários</label>

                <textarea
                    id="comentarios"
                    rows="4"
                ></textarea>
            </div>

            <div class="campo">
                <label>Foto *</label>

                <input
                    type="file"
                    id="foto"
                    accept="image/*"
                    capture="environment"
                    required
                >
            </div>

            <button
                type="submit"
                id="btnEnviar"
            >
                ENVIAR
            </button>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="perguntas.js"></script>
    <script src="app.js"></script>

</body>
</html>
