<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambev - Gabaritos de Segurança</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">

        <h1>AMBEV</h1>
        <h2>Gabritos de Segurança</h2>

        <form id="avaliacaoForm">

            <div class="campo">
                <label>ID Avaliador *</label>
                <input
                    type="text"
                    id="idAvaliador"
                    maxlength="10"
                    required
                >
            </div>

            <div class="campo">
                <label>ID Avaliado *</label>
                <input
                    type="text"
                    id="idAvaliado"
                    maxlength="10"
                    required
                >
            </div>

            <div class="campo">
                <label>Tipo de Avaliação *</label>

                <select id="tipoAvaliacao" required>
                    <option value="">Selecione</option>
                    <option value="GSL">GSL</option>
                    <option value="GSR_CARRO">GSR Carro</option>
                    <option value="GSR_MOTO">GSR Moto</option>
                    <option value="GSR_PE">GSR A Pé</option>
                </select>
            </div>

            <div
                id="placaContainer"
                class="campo oculto"
            >
                <label id="placaLabel"></label>

                <input
                    type="text"
                    id="placaVeiculo"
                    maxlength="10"
                >
            </div>

            <div id="perguntasContainer"></div>

            <div class="campo">
                <label>Comentários</label>

                <textarea
                    id="comentario"
                    rows="4"
                ></textarea>
            </div>

            <button
                type="submit"
                id="btnEnviar"
            >
                Enviar Avaliação
            </button>

        </form>

        <div id="mensagem"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
