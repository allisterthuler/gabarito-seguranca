<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito de Segurança</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Ambev - Gabarito de Segurança</h1>

    <form id="form">

        <input id="idAvaliador" placeholder="ID Avaliador" required>
        <input id="idFuncionario" placeholder="ID Funcionário" required>

        <select id="questionario" required>
            <option value="">Selecione</option>
            <option value="GSL">GSL</option>
            <option value="CARRO">CARRO</option>
            <option value="MOTO">MOTO</option>
            <option value="APE">A PÉ</option>
        </select>

        <div id="perguntas"></div>

        <input id="placa" placeholder="Placa (se aplicável)">

        <textarea id="comentarios" placeholder="Comentários"></textarea>

        <input type="file" id="foto" accept="image/*" capture="environment" required>

        <button type="submit">Enviar</button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
