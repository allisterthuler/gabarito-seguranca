<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportar Avaliações</title>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#0F3787;
            margin:0;
            padding:20px;
        }

        .card{
            max-width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:12px;
        }

        h1{
            text-align:center;
            color:#0F3787;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            box-sizing:border-box;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:12px;
            background:#0F3787;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        #status{
            margin-top:15px;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="card">

    <h1>Exportar Excel</h1>

    <label>Senha</label>
    <input type="password" id="senha">

    <button onclick="exportar()">
        Gerar Excel
    </button>

    <div id="status"></div>

</div>

<script>

async function exportar(){

    const senha = document.getElementById("senha").value;

    const status = document.getElementById("status");

    status.innerHTML = "Gerando arquivo...";

    const resposta = await fetch("/api/exportar",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            senha
        })
    });

    if(!resposta.ok){
        status.innerHTML = "Senha inválida ou erro.";
        return;
    }

    const dados = await resposta.json();

    const ws = XLSX.utils.json_to_sheet(dados);

    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Avaliacoes"
    );

    XLSX.writeFile(
        wb,
        "avaliacoes.xlsx"
    );

    status.innerHTML = "Download concluído.";

}

</script>

</body>
</html>
